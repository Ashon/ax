project: tasknote
orchestrator_runtime: codex
idle_timeout_minutes: 1

workspaces:
  core:
    dir: ./core
    description: "Owns pure task-domain logic and markdown rendering."
    runtime: codex
    instructions: |
      You own only this core module.
      Do not edit ../cli.
      Keep the task logic dependency-free.

  cli:
    dir: ./cli
    description: "Owns the CLI binary, file I/O, and command UX."
    runtime: codex
    instructions: |
      You own only this CLI module.
      Do not edit ../core unless the orchestrator explicitly asks for it.
      Use the core module as the shared task-domain library.
